<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Ashoka Chakra -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Main circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#1e40af" stroke-width="1.5"/>
  
  <!-- Chakra spokes (24 spokes) -->
  <g stroke="#1e40af" stroke-width="1" opacity="0.7">
    <line x1="100" y1="20" x2="100" y2="40" />
    <line x1="100" y1="160" x2="100" y2="180" />
    <line x1="20" y1="100" x2="40" y2="100" />
    <line x1="160" y1="100" x2="180" y2="100" />
    
    <!-- Diagonal spokes -->
    <line x1="135.3" y1="35.3" x2="149.7" y2="49.7" />
    <line x1="50.3" y1="150.3" x2="64.7" y2="164.7" />
    <line x1="164.7" y1="50.3" x2="149.7" y2="35.3" />
    <line x1="64.7" y1="164.7" x2="50.3" y2="150.3" />
  </g>
  
  <!-- Inner emblem - lions (simplified as circles for now) -->
  <circle cx="70" cy="70" r="8" fill="#1e40af" opacity="0.6"/>
  <circle cx="130" cy="70" r="8" fill="#1e40af" opacity="0.6"/>
  <circle cx="100" cy="130" r="8" fill="#1e40af" opacity="0.6"/>
  
  <!-- Center element -->
  <circle cx="100" cy="100" r="12" fill="#1e40af"/>
  <circle cx="100" cy="100" r="8" fill="#fbbf24"/>
</svg>